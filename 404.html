<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      window.location.replace(
        window.location.origin +
        window.location.pathname.replace(/\/[^/]*$/, "") +
        "/#" +
        window.location.pathname.slice(1)
      );
    </script>
  </head>
  <body></body>
</html>
